<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фразовые глаголы - Тренажер</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="shortcut icon" href="/static/favicon.png">
</head>

<body>
    <div class="background-overlay" id="backgroundOverlay">
        <!-- Пример: background-image: url('data:image/png;base64,YOUR_BASE64_HERE'); -->
    </div>

    <div class="container">
        <header>
            <div class="header-content">
                <img src="/static/logo.png" alt="Logo" class="header-logo">
                <div class="header-text">
                    <h1>Фразовые глаголы</h1>
                    <p class="subtitle">Интерактивный тренажер для изучения английских фразовых глаголов</p>
                </div>
            </div>
        </header>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="text">📝 Генерация текстов</button>
            <button class="mode-btn" data-mode="image">🖼️ Описание изображений</button>
        </div>

        <!-- Режим 1: Генерация текстов -->
        <div class="mode-content active" id="textMode">
            <div class="verb-group-selector">
                <h3>Выберите группу фразовых глаголов:</h3>
                <select id="verbGroupSelect">
                    <option value="">-- Выберите группу --</option>
                </select>
                <button id="generateTextBtn" class="btn-primary">🎲 Сгенерировать текст</button>
            </div>

            <div class="exercise-area" id="textExerciseArea" style="display: none;">
                
                <div class="exercise-text" id="generatedText"></div>

                
                <div class="answers-list" id="answersList"></div>

                <div class="drag-options" id="dragOptions"></div>
                <div class="drop-zones" id="dropZones"></div>
                <button id="checkTextBtn" class="btn-primary">✓ Проверить ответы</button>
                <div class="feedback" id="textFeedback"></div>
            </div>
        </div>

        <!-- Режим 2: Описание изображений -->
        <div class="mode-content" id="imageMode">
            <div class="image-upload-area">
                <h3>Загрузите изображение:</h3>
                <input type="file" id="imageInput" accept="image/*">
                <button id="analyzeImageBtn" class="btn-primary">🔍 Анализировать изображение</button>
            </div>

            <div class="exercise-area" id="imageExerciseArea" style="display: none;">
                <div class="image-preview">
                    <img id="uploadedImage" src="" alt="Загруженное изображение">
                </div>

                <div class="exercise-text" id="imageDescription"></div>

                <div class="answers-list" id="imageAnswersList"></div>

                <div class="drag-options" id="imageDragOptions"></div>
                <div class="drop-zones" id="imageDropZones"></div>
                <button id="checkImageBtn" class="btn-primary">✓ Проверить ответ</button>
                <div class="feedback" id="imageFeedback"></div>
            </div>
        </div>

        <!-- Статистика -->
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">Правильных ответов:</span>
                <span class="stat-value" id="correctCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Всего попыток:</span>
                <span class="stat-value" id="totalCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Процент успеха:</span>
                <span class="stat-value" id="successRate">0%</span>
            </div>
        </div>
    </div>

    <!-- Модальное окно логотипа -->
    <div class="logo-modal" id="logoModal">
        <div class="logo-modal-overlay"></div>
        <div class="logo-modal-content">
            <button class="logo-modal-close" id="logoModalClose">&times;</button>
            <img src="/static/logo.png" alt="Logo" class="logo-modal-image" id="logoModalImage">
            <div class="logo-modal-caption">
                Это логотип приложения<span class="footnote-star">*</span>
                <span class="footnote-text">*оммаж на легендарные «Это электробус» и «Это автономный трамвай»</span>
            </div>
                    </div> 
                </div> 

    <script src="./static/script.js"></script>
</body>

</html>
